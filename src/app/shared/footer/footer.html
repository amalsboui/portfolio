<footer class="py-8 text-center" 
        style="border-top: 1px solid var(--border); background: var(--footer-bg); position: relative; z-index: 2; box-shadow: 0 -2px 12px rgba(0,0,0,0.04);">
  <p style="color:var(--muted); font-size:1rem">
    {{ 'footer.built' | translate }} <span style="color:var(--blue)">Amal Sboui</span>
    · Angular 21
    <span style="color:var(--plum)">_</span>
  </p>
  
  <div class="mt-4 flex justify-center gap-6">
    <a href="https://github.com/amalsboui/portfolio" target="_blank"
       style="color:var(--muted); text-decoration: none; font-size:0.9rem; transition: color 0.2s;"
       onmouseover="this.style.color='var(--plum)'"
       onmouseout="this.style.color='var(--muted)'">
      [ {{ 'footer.source' | translate }} ]
    </a>
  </div>
</footer>
