<section class="section">
  <h2 class="section-title">Skills</h2>

  <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
    @for (group of groups; track group.category) {
      <div class="card p-5">
        <p class="text-sm mb-4 font-bold" style="color: var(--text)">
          {{ group.category }}
        </p>
        <div class="flex flex-wrap gap-2">
          @for (skill of group.items; track skill.name) {
            <div class="flex items-center gap-2 px-3 py-2 rounded-md"
                 style="background: var(--bg); border: 1px solid var(--border)">
              @if (skill.icon) {
                 <span class="iconify w-4 h-4" 
                      [attr.data-icon]="skill.icon" 
                      data-width="16" 
                      data-height="16"></span>
              }
              <span class="text-xs font-medium" style="color: var(--muted)">{{ skill.name }}</span>
            </div>
          }
        </div>
      </div>
    }
  </div>
</section>
