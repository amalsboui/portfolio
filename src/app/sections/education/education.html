<section class="section">
  <h2 class="section-title">{{ 'education.title' | translate }}</h2>

  <div class="relative pl-8">
    <div class="absolute left-0 top-0 bottom-0 w-px" style="background: var(--border)"></div>

    <div class="space-y-10">
      @for (entry of education; track entry.periodKey) {
        <div class="relative">
          <div class="absolute -left-8 top-1.5 w-3 h-3 rounded-full" style="background: var(--pink)"></div>
          
          <p class="text-sm font-medium mb-1" style="color: var(--muted)">{{ entry.periodKey | translate }}</p>
          <h3 class="text-lg font-bold mb-1" style="color: var(--text)">{{ entry.schoolKey | translate }}</h3>
          <p class="text-base" style="color: var(--muted)">{{ entry.programKey | translate }}</p>
        </div>
      }
    </div>
  </div>
</section>
