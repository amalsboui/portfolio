<section class="section">
  <h2 class="section-title">Experience</h2>

  <div class="relative pl-8">
    <!-- vertical line -->
    <div class="absolute left-0 top-0 bottom-0 w-px" style="background: var(--border)"></div>

    <div class="space-y-10">
      @for (entry of timeline; track entry.role) {
        <div class="relative">
          <!-- dot -->
          <div class="absolute -left-8 top-1.5 w-3 h-3 rounded-full" style="background: var(--pink)"></div>

          <p class="text-sm font-medium mb-1" style="color: var(--muted)">{{ entry.period }}</p>
          <h3 class="text-xl font-bold mb-1" style="color: var(--blue)">{{ entry.role }}</h3>
          <p class="text-base mb-2" style="color: var(--text)">{{ entry.org }}</p>
          <ul class="space-y-1">
            @for (point of entry.points; track point) {
              <li class="text-base flex gap-2" style="color: var(--muted)">
                <span style="color: var(--pink)">•</span><span>{{ point }}</span>
              </li>
            }
          </ul>
        </div>
      }
    </div>
  </div>
</section>
