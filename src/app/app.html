<div class="page-wrapper">
  <div class="grid-overlay">
    @for (cell of gridCells; track cell.row + '-' + cell.col) {
      <div 
        class="grid-cell"
        [style.opacity]="getCellStyle(cell.row, cell.col).opacity"
        [style.background]="getCellStyle(cell.row, cell.col).background"
        [style.borderColor]="getCellStyle(cell.row, cell.col).borderColor"
        [style.transform]="getCellStyle(cell.row, cell.col).transform"
      ></div>
    }
  </div>
  
  <div class="content-wrapper">
    <app-navbar />
    <main>
      <app-hero id="home" />
      <app-about id="about" />
      <app-experience id="experience" />
      <app-certifications id="certifications" />
      <app-skills id="skills" />
      <app-projects id="projects" />
      <app-contact id="contact" />
    </main>
    <app-footer />
  </div>
</div>
